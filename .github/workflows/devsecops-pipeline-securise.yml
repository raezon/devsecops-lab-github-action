name: "DevSecOps Pipeline — TechFlow SAS (Sécurisé Local avec Quality Gate)"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ✅ Principe du moindre privilège
permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: ghcr.io/techflow/api
  NODE_VERSION: "20.11.0"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 1 : Intégration, Scans (SAST/SCA/IaC) & Tests Globaux
  # ════════════════════════════════════════════════════════════════════════════
  build-and-scan:
    name: "🛠️ Build, Tests & Scans de Sécurité"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # ⚡ CACHE : Configuration du cache partagé pour Trivy DB et Semgrep
      - name: ⚡ Configuration du Cache pour les outils de Sécurité
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy
            ~/.cache/semgrep
          key: ${{ runner.os }}-security-caches-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-security-caches-

      # 1. SAST Local (Semgrep)
      - name: 🔍 Semgrep OSS Scan
        run: |
          docker run --rm -v ~/.cache/semgrep:/workspace/.cache/semgrep -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep ci \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --text --output=semgrep-human-report.txt || echo "Scans Semgrep complétés avec des alertes."

      # 2. SCA Local (Trivy - Packages Applicatifs)
      - name: 📦 Trivy SCA — Scan des Dépendances (Packages)
        run: |
          docker run --rm -v ~/.cache/trivy:/root/.cache/trivy -v "${{ github.workspace }}:/src" aquasec/trivy:latest fs /src \
            --scanners vuln \
            --format table \
            --severity HIGH,CRITICAL \
            --output /src/trivy-sca-report.txt || echo "SCA complété."

      # 3. IaC/Misconfig (Trivy - Dockerfile Security)
      - name: 🐳 Trivy Config — Scan Sécurité du Dockerfile
        run: |
          docker run --rm -v ~/.cache/trivy:/root/.cache/trivy -v "${{ github.workspace }}:/src" aquasec/trivy:latest config /src/docker/ \
            --format table \
            --severity HIGH,CRITICAL \
            --output /src/trivy-dockerfile-report.txt || echo "Scan du Dockerfile complété."

      # 4. Build Image Docker local
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Image Docker
        run: |
          docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} . || echo "Échec du build Docker"

      # 5. Container Scan Local (Trivy Image) - Format Markdown Humain
      - name: 🐳 Trivy — Scan de l'image Docker (Markdown)
        uses: aquasecurity/trivy-action@v0.20.0
        continue-on-error: true
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: 'template'
          template: '__builtin___markdown'
          output: 'trivy-image-report.md'
          severity: 'HIGH,CRITICAL'

      # 6. Export JSON technique indispensable pour l'étape du Quality Gate
      - name: 💾 Trivy — Export JSON pour le Quality Gate final
        uses: aquasecurity/trivy-action@v0.20.0
        continue-on-error: true
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: 'json'
          output: 'trivy-image-results.json'
          severity: 'HIGH,CRITICAL'

      # 7. Tests unitaires & Couverture
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          
      - name: 🧪 Exécution des Tests
        run: |
          npm ci
          npm test -- --coverage || echo "Certains tests unitaires ont échoué."

      # 8. Téléversement des rapports ENRICHIS (Contient désormais le scan Package ET Dockerfile)
      - name: 💾 [Artéfact] Archivage des rapports d'analyse
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-and-tests-reports
          path: |
            semgrep-human-report.txt
            trivy-sca-report.txt
            trivy-dockerfile-report.txt
            trivy-image-report.md
            trivy-image-results.json
            coverage/

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 2 : Déploiement Staging & DAST (S'exécute QUOI QU'IL ARRIVE)
  # ════════════════════════════════════════════════════════════════════════════
# ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 2 : Déploiement Staging & DAST (Nettoyé, ultra-rapide et local)
  # ════════════════════════════════════════════════════════════════════════════
  staging-and-dast:
    name: "🔬 Staging & DAST (OWASP ZAP Local)"
    runs-on: ubuntu-22.04
    needs: build-and-scan
    if: always()
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR et Build local pour Staging
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} . || echo "Build de secours appliqué"

      - name: Déployer l'environnement Staging en Local
        run: |
          IMAGE_TAG=${{ github.sha }} docker compose -f docker-compose.staging.yml up -d || echo "Docker-compose déjà démarré ou géré"
          # Attente rapide pour s'assurer que l'API a démarré sur son port
          sleep 5

      # 🎯 On attaque directement localhost sans aucun intermédiaire !
      - name: OWASP ZAP — Scan DAST Local
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:3000'
          fail_action: false
          rules_file_name: ".zap-rules.tsv"
          # On indique à ZAP d'utiliser le réseau de l'hôte pour joindre le localhost du runner
          docker_name_args: '--network=host'

      - name: 💾 [Artéfact] Téléverser Rapport DAST (Lisible)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-zap-dast-report
          path: |
            zap_report.html
            zap_report.md

      - name: Stop Staging Environment
        if: always()
        run: docker compose -f docker-compose.staging.yml down || true
  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 3 : QUALITY GATE (Le seul point de contrôle strict)
  # ════════════════════════════════════════════════════════════════════════════
  quality-gate:
    name: "🛡️ Évaluation du Quality Gate"
    runs-on: ubuntu-22.04
    needs: staging-and-dast
    if: always()
    steps:
      - name: Récupérer le rapport JSON Trivy
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: security-and-tests-reports
          path: .

      - name: Vérifier le seuil des failles (> 1)
        run: |
          if [ ! -f trivy-image-results.json ]; then
            echo "❌ ÉCHEC CRITIQUE : Rapport de vulnérabilités introuvable. Sécurité compromise."
            exit 1
          fi

          VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy-image-results.json || echo "0")
          echo "═════════════════════════════════════════════════"
          echo "⚠️ NOMBRE DE VULNÉRABILITÉS CRITIQUES/HAUTES : $VULN_COUNT"
          echo "═════════════════════════════════════════════════"
          
          if [ "$VULN_COUNT" -gt 1 ]; then
            echo "❌ ÉCHEC : Plus de 1 faille critique/haute détectée ($VULN_COUNT trouvées)."
            echo "Le déploiement en production est bloqué."
            exit 1
          else
            echo "✅ QUALITY GATE VALIDE ($VULN_COUNT failles). Autorisation accordée !"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 4 : Déploiement Production (Bloqué si le Quality Gate a échoué)
  # ════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: "🚀 Déploiement Production"
    runs-on: ubuntu-22.04
    needs: quality-gate
    environment:
      name: production
      url: https://api.techflow.io
    steps:
      - uses: actions/checkout@v4

      - name: Connexion au Registre & Push de l'image validée
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy final
        run: |
          echo "🚀 Image poussée sur GHCR avec succès et prête pour la mise en production !"