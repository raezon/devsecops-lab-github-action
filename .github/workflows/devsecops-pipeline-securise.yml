name: "DevSecOps Pipeline — TechFlow SAS (Sécurisé Local)"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ✅ Principe du moindre privilège
permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: ghcr.io/techflow/api
  NODE_VERSION: "20.11.0"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 1 : Analyse statique (SAST Local sans Cloud)
  # ════════════════════════════════════════════════════════════════════════════
  sast:
    name: "🔍 Étape 1 : SAST Local (Semgrep OSS)"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Utilisation directe de l'image officielle en local sans clé API
      - name: Semgrep OSS Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep ci \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --sarif --output=semgrep.sarif
        continue-on-error: true

      - name: 💾 [Artéfact] Téléverser Rapport SAST Semgrep
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-semgrep-report
          path: semgrep.sarif

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 2 : Build de l'image Docker (Fait APRES le SAST)
  # ════════════════════════════════════════════════════════════════════════════
  build-docker:
    name: "🐳 Étape 2 : Build Image Docker"
    runs-on: ubuntu-22.04
    needs: sast
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image Docker depuis docker/
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --iidfile image-id.txt \
            .

      - name: 💾 [Artéfact] Sauvegarder ID de l'image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-build-metadata
          path: image-id.txt

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 3 : Analyse des dépendances (SCA Local via Trivy FS) & Scan Image
  # ════════════════════════════════════════════════════════════════════════════
  security-scans:
    name: "📦 Étape 3 : SCA Local (Trivy) + Image Scan"
    runs-on: ubuntu-22.04
    needs: build-docker
    steps:
      - uses: actions/checkout@v4

      # 1. SCA LOCAL : On utilise Trivy sur le système de fichiers pour remplacer Snyk/npm-audit
      - name: Trivy SCA — Scan du package.json (Dépendances)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-sca-results.sarif'
          severity: 'HIGH,CRITICAL'

      # 2. CONTAINER SCAN : On scanne l'image Docker construite à l'étape précédente
      - name: Trivy — Scan vulnérabilités de l'image Docker
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: 💾 [Artéfact] Téléverser Rapport SCA Dépendances
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: local-sca-report
          path: trivy-sca-results.sarif

      - name: 💾 [Artéfact] Téléverser Rapport Container Scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: local-container-report
          path: trivy-image-results.sarif

      - name: Injection des résultats SARIF dans l'onglet Security de GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image-results.sarif'

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 4 : Tests unitaires localisés & Signature de l'image
  # ════════════════════════════════════════════════════════════════════════════
  unit-tests-and-sign:
    name: "🧪 Étape 4 : Tests & Signature Cosign"
    runs-on: ubuntu-22.04
    needs: security-scans
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          
      - run: npm ci
      - run: npm test -- --coverage
      
      - name: 💾 [Artéfact] Téléverser Rapport de Couverture HTML (Consulter localement)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-tests-coverage-report
          path: coverage/

      - name: Log in to GitHub Container Registry (GHCR)
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image validée vers GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Sign image (Cosign)
        run: |
          cosign sign --key ${{ secrets.COSIGN_PRIVATE_KEY }} \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 5 : Déploiement Staging (Docker Compose) + DAST (ngrok)
  # ════════════════════════════════════════════════════════════════════════════
  staging-and-dast:
    name: "🔬 Étape 5 : Staging (Docker Compose) + DAST"
    runs-on: ubuntu-22.04
    needs: unit-tests-and-sign
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR on Runner
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Déployer l'environnement via Docker Compose
        run: |
          IMAGE_TAG=${{ github.sha }} docker compose -f docker-compose.staging.yml up -d
          sleep 10

      - name: Start ngrok tunnel (Port local 3000)
        id: ngrok
        uses: ngrok/ngrok-forwarder-action@v2
        with:
          ngrok_auth_token: ${{ secrets.NGROK_AUTH_TOKEN }}
          port: "3000"

      - name: OWASP ZAP — Scan DAST local via l'URL ngrok
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: ${{ steps.ngrok.outputs.ngrok_url }}
          fail_action: true
          rules_file_name: ".zap-rules.tsv"

      - name: 💾 [Artéfact] Téléverser Rapport OWASP ZAP DAST
        uses: actions/upload-artifact@v4