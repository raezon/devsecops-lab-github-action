name: "DevSecOps Pipeline — TechFlow SAS (Sécurisé Local avec Quality Gate)"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ✅ Principe du moindre privilège
permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: ghcr.io/techflow/api
  NODE_VERSION: "20.11.0"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 1 : Intégration, Scans (SAST/SCA) & Tests Globaux
  # ════════════════════════════════════════════════════════════════════════════
  build-and-scan:
    name: "🛠️ Build, Tests & Scans de Sécurité"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # 1. SAST Local (Semgrep)
      - name: 🔍 Semgrep OSS Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep ci \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --text --output=semgrep-human-report.txt || echo "Scans Semgrep complétés."

      # 2. SCA Local (Trivy Dépendances)
      - name: 📦 Trivy SCA — Scan du package.json
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-sca-report.txt'
          severity: 'HIGH,CRITICAL'

      # 3. Build Image Docker local
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Image Docker
        run: |
          docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # 4. Container Scan Local (Trivy Image) - Format Lisible (MD) + Technique (JSON)
      - name: 🐳 Trivy — Scan de l'image Docker (Markdown)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: 'template'
          template: '__builtin___markdown'
          output: 'trivy-image-report.md'
          severity: 'HIGH,CRITICAL'

      - name: 💾 Trivy — Export JSON pour le Quality Gate final
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: 'json'
          output: 'trivy-image-results.json'
          severity: 'HIGH,CRITICAL'

      # 5. Tests unitaires & Couverture
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          
      - name: 🧪 Exécution des Tests
        run: |
          npm ci
          npm test -- --coverage

      # 6. Téléversement groupé de TOUS les artefacts lisibles de cette étape
      - name: 💾 [Artéfact] Archivage des rapports d'analyse
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-and-tests-reports
          path: |
            semgrep-human-report.txt
            trivy-sca-report.txt
            trivy-image-report.md
            trivy-image-results.json
            coverage/

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 2 : Déploiement Staging & DAST (Dynamique)
  # ════════════════════════════════════════════════════════════════════════════
  staging-and-dast:
    name: "🔬 Staging & DAST (OWASP ZAP)"
    runs-on: ubuntu-22.04
    needs: build-and-scan
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR et Build local pour Staging
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # On build l'image à la volée sur ce runner pour le conteneur de test local
          docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Déployer l'environnement Staging
        run: |
          IMAGE_TAG=${{ github.sha }} docker compose -f docker-compose.staging.yml up -d
          sleep 15

      - name: Start ngrok tunnel
        id: ngrok
        uses: ngrok/ngrok-forwarder-action@v2
        with:
          ngrok_auth_token: ${{ secrets.NGROK_AUTH_TOKEN }}
          port: "3000"

      - name: OWASP ZAP — Scan DAST
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: ${{ steps.ngrok.outputs.ngrok_url }}
          fail_action: false # On ne fait pas planter ici
          rules_file_name: ".zap-rules.tsv"

      - name: 💾 [Artéfact] Téléverser Rapport DAST (Lisible)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-zap-dast-report
          path: |
            zap_report.html
            zap_report.md

      - name: Stop Staging Environment
        if: always()
        run: docker compose -f docker-compose.staging.yml down

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 3 : QUALITY GATE (Décision finale basée sur le JSON de l'étape 1)
  # ════════════════════════════════════════════════════════════════════════════
  quality-gate:
    name: "🛡️ Évaluation du Quality Gate"
    runs-on: ubuntu-22.04
    needs: staging-and-dast
    steps:
      - name: Récupérer le rapport JSON Trivy
        uses: actions/download-artifact@v4
        with:
          name: security-and-tests-reports
          path: .

      - name: Vérifier le seuil des failles (> 1)
        run: |
          VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy-image-results.json || echo "0")
          echo "═════════════════════════════════════════════════"
          echo "⚠️ NOMBRE DE VULNÉRABILITÉS CRITIQUES/HAUTES : $VULN_COUNT"
          echo "═════════════════════════════════════════════════"
          
          if [ "$VULN_COUNT" -gt 1 ]; then
            echo "❌ ÉCHEC : Plus de 1 faille critique détectée ($VULN_COUNT trouvées)."
            echo "Le déploiement en production est annulé."
            exit 1
          else
            echo "✅ QUALITY GATE VALIDE ($VULN_COUNT failles). Autorisation de déploiement."
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 4 : Déploiement Production (S'exécute UNIQUEMENT si le Gate est ✅)
  # ════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: "🚀 Déploiement Production"
    runs-on: ubuntu-22.04
    needs: quality-gate
    environment:
      name: production
      url: https://api.techflow.io
    steps:
      - uses: actions/checkout@v4

      - name: Connexion au Registre & Push de l'image validée
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # On build une dernière fois pour l'envoyer de manière permanente sur GHCR
          docker build -f docker/Dockerfile -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy final
        run: |
          echo "🚀 Image poussée sur GHCR avec succès et disponible pour le serveur de Production !"