name: "DevSecOps Pipeline — TechFlow SAS (Sécurisé Local avec Quality Gate)"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# ✅ Principe du moindre privilège
permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: ghcr.io/techflow/api
  NODE_VERSION: "20.11.0"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 1 : Analyse statique (SAST Local en format Humain)
  # ════════════════════════════════════════════════════════════════════════════
  sast:
    name: "🔍 Étape 1 : SAST Local (Semgrep OSS)"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Génération d'un fichier texte/markdown lisible en plus du SARIF standard
      - name: Semgrep OSS Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep ci \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --config=p/secrets \
            --text --output=semgrep-human-report.txt || echo "Scans terminés avec des correspondances."

      - name: 💾 [Artéfact] Téléverser Rapport SAST Semgrep (Lisible)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-semgrep-human-report
          path: semgrep-human-report.txt

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 2 : Build de l'image Docker
  # ════════════════════════════════════════════════════════════════════════════
  build-docker:
    name: "🐳 Étape 2 : Build Image Docker"
    runs-on: ubuntu-22.04
    needs: sast
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image Docker depuis docker/
        run: |
          docker build \
            -f docker/Dockerfile \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --iidfile image-id.txt \
            .

      - name: 💾 [Artéfact] Sauvegarder ID de l'image
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-build-metadata
          path: image-id.txt

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 3 : Analyse SCA & Conteneur (Trivy au format HTML Lisible)
  # ════════════════════════════════════════════════════════════════════════════
  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 3 : Analyse SCA & Conteneur (Trivy au format HTML/MD Solide)
  # ════════════════════════════════════════════════════════════════════════════
  security-scans:
    name: "📦 Étape 3 : SCA Local (Trivy HTML)"
    runs-on: ubuntu-22.04
    needs: build-docker
    steps:
      - uses: actions/checkout@v4

      # SCA LOCAL : Analyse du package.json (Format Table texte lisible)
      - name: Trivy SCA — Scan du package.json (Dépendances)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table' # Sortie ultra lisible directement dans les logs si besoin
          output: 'trivy-sca-report.txt'
          severity: 'HIGH,CRITICAL'

      # CONTAINER SCAN LOCAL : Utilisation du format GitHub Markdown natif de Trivy (aucun fichier tpl externe requis)
      - name: Trivy — Scan de l'image Docker (Format Markdown Lisible)
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: 'template'
          template: '__builtin___markdown' # Utilise le template de secours directement packagé dans Trivy
          output: 'trivy-image-report.md'
          severity: 'HIGH,CRITICAL'

      # Export JSON technique indispensable pour le script de Quality Gate (Étape 6)
      - name: Trivy — Export JSON technique pour le Quality Gate
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: 'json'
          output: 'trivy-image-results.json'
          severity: 'HIGH,CRITICAL'

      - name: 💾 [Artéfact] Téléverser Rapports Trivy (Lisibles)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-trivy-html-reports
          path: |
            trivy-sca-report.txt
            trivy-image-report.md
            trivy-image-results.json

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 4 : Tests unitaires localisés (Rapport de Couverture)
  # ════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: "🧪 Étape 4 : Tests Unitaires & Couverture"
    runs-on: ubuntu-22.04
    needs: security-scans
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          
      - run: npm ci
      - run: npm test -- --coverage
      
      - name: 💾 [Artéfact] Téléverser Rapport de Couverture HTML (Lisible)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-tests-coverage-report
          path: coverage/

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 5 : Déploiement Staging (Docker Compose) + DAST (OWASP ZAP HTML)
  # ════════════════════════════════════════════════════════════════════════════
  staging-and-dast:
    name: "🔬 Étape 5 : Staging & DAST"
    runs-on: ubuntu-22.04
    needs: unit-tests
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Déployer l'environnement Staging
        run: |
          IMAGE_TAG=${{ github.sha }} docker compose -f docker-compose.staging.yml up -d
          sleep 15

      - name: Start ngrok tunnel
        id: ngrok
        uses: ngrok/ngrok-forwarder-action@v2
        with:
          ngrok_auth_token: ${{ secrets.NGROK_AUTH_TOKEN }}
          port: "3000"

      - name: OWASP ZAP — Scan DAST (Génère HTML/MD par défaut)
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: ${{ steps.ngrok.outputs.ngrok_url }}
          fail_action: false # On ne fait pas planter ici, on laisse le Quality Gate décider à la fin
          rules_file_name: ".zap-rules.tsv"

      - name: 💾 [Artéfact] Téléverser Rapport OWASP ZAP DAST (Lisible)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-zap-dast-report
          path: |
            zap_report.html
            zap_report.md

      - name: Stop Staging Environment
        if: always()
        run: docker compose -f docker-compose.staging.yml down

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 6 : QUALITY GATE (Analyse tous les rapports accumulés)
  # ════════════════════════════════════════════════════════════════════════════
  quality-gate:
    name: "🛡️ Étape 6 : Quality Gate Evaluation"
    runs-on: ubuntu-22.04
    needs: staging-and-dast
    steps:
      - name: Récupérer les métadonnées et rapports Trivy sauvegardés
        uses: actions/download-artifact@v4
        with:
          name: security-trivy-html-reports
          path: .

      - name: Analyser le nombre de vulnérabilités (Seuil > 1)
        run: |
          # Extraction du nombre total de vulnérabilités High et Critical depuis le JSON
          VULN_COUNT=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH" or .Severity=="CRITICAL")] | length' trivy-image-results.json || echo "0")
          echo "═════════════════════════════════════════════════"
          echo "⚠️ NOMBRE DE VULNÉRABILITÉS CRITIQUES/HAUTES : $VULN_COUNT"
          echo "═════════════════════════════════════════════════"
          
          if [ "$VULN_COUNT" -gt 1 ]; then
            echo "❌ ÉCHEC DU QUALITY GATE : Plus de 1 faille critique détectée ($VULN_COUNT trouvées)."
            echo "Le déploiement en production est bloqué pour protéger l'infrastructure."
            exit 1
          else
            echo "✅ QUALITY GATE VALIDE : $VULN_COUNT faille(s) détectée(s). Autorisation de déploiement."
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # ÉTAPE 7 : Déploiement Production (S'exécute UNIQUEMENT si l'Étape 6 est ✅)
  # ════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: "🚀 Étape 7 : Production Docker Compose"
    runs-on: ubuntu-22.04
    needs: quality-gate
    environment:
      name: production
      url: https://api.techflow.io
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR et Push final
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy via Docker Compose en Production
        run: |
          echo "🚀 Quality gate respecté. Déploiement en cours sur la machine de production..."
          # IMAGE_TAG=${{ github.sha }} docker compose -f docker-compose.prod.yml up -d