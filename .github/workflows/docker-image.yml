name: "DevSecOps Module 1 — SAST + SCA"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: "20.11.0"

jobs:
  sast-and-sca:
    name: "SAST (Semgrep) + SCA (Trivy)"
    runs-on: ubuntu-22.04
    steps:

      # 1. Cloner le repo
      - uses: actions/checkout@v4

      # 2. Cache des outils
      - name: Cache Trivy DB + Semgrep Rules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/trivy
            ~/.cache/semgrep
          key: ${{ runner.os }}-security-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-security-

      # 3. SAST — Analyse statique du code (Semgrep)
      - name: SAST — Semgrep OSS
        run: |
          docker run --rm \
            -v ~/.cache/semgrep:/workspace/.cache/semgrep \
            -v "${{ github.workspace }}:/work" \
            returntocorp/semgrep semgrep ci \
              --config=p/javascript \
              --config=p/nodejs \
              --config=p/owasp-top-ten \
              --config=p/secrets \
              --text --output=semgrep-human-report.txt \
          || echo "Semgrep : alertes détectées, rapport généré."

      # 4. SCA — Scan des dépendances (package.json à la racine)
      - name: SCA — Trivy Dépendances
        run: |
          docker run --rm \
            -v ~/.cache/trivy:/root/.cache/trivy \
            -v "${{ github.workspace }}:/work" \
            aquasec/trivy:latest fs /work \
              --scanners vuln \
              --format table \
              --severity HIGH,CRITICAL \
              --output /work/trivy-sca-report.txt \
          || echo "Trivy SCA : vulnérabilités détectées, rapport généré."

      # 5. IaC — Scan du Dockerfile (à la racine)
      - name: IaC — Trivy Config (Dockerfile)
        run: |
          docker run --rm \
            -v ~/.cache/trivy:/root/.cache/trivy \
            -v "${{ github.workspace }}:/work" \
            aquasec/trivy:latest config /work/ \
              --format table \
              --severity HIGH,CRITICAL \
              --output /work/trivy-dockerfile-report.txt \
          || echo "Trivy Config : vulnérabilités détectées, rapport généré."

      # 6. Archive des rapports
      - name: Archivage des rapports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: module1-security-reports
          path: |
            semgrep-human-report.txt
            trivy-sca-report.txt
            trivy-dockerfile-report.txt
          retention-days: 30
